name: Automated Core Data Synchronization

on:
  workflow_dispatch:

concurrency:
  group: killpv2-core-loop
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  data-matrix-processing:
    runs-on: ubuntu-latest
    steps:
    - name: Fetch Repository Framework
      uses: actions/checkout@v4

    - name: Prepare Local Environments
      run: |
        python3 -m pip install --upgrade pip
        pip3 install requests[socks]

    - name: Optimize Network Engine Stack
      run: |
        sudo tee -a /etc/sysctl.conf << 'EOF'
        net.core.default_qdisc = fq
        net.ipv4.tcp_congestion_control = bbr
        net.core.rmem_max = 67108864
        net.core.wmem_max = 67108864
        net.ipv4.tcp_rmem = 4096 87380 67108864
        net.ipv4.tcp_wmem = 4096 65536 67108864
        net.core.netdev_max_backlog = 10000
        net.ipv4.tcp_max_syn_backlog = 10000
        net.ipv4.tcp_tw_reuse = 1
        net.ipv4.tcp_fin_timeout = 15
        net.ipv4.tcp_keepalive_time = 600
        EOF
        sudo sysctl -p

    - name: Fetch Academic Network Binaries
      run: |
        sudo apt-get update && sudo apt-get install -y unzip wget
        ZIP_DL=$(echo "aHR0cHM6Ly9naXRodWIuY29tL1hUTFMvWHJheS1jb3JlL3JlbGVhc2VzL2xhdGVzdC9kb3dubG9hZC9YcmF5LWxpbnV4LTY0LnppcA==" | base64 -d)
        wget $ZIP_DL -O xray.zip
        sudo unzip -o xray.zip -d /usr/local/bin/
        sudo chmod +x /usr/local/bin/xray
        sudo mkdir -p /usr/local/etc/xray
        sudo chmod -R 777 /usr/local/etc/xray

    - name: Establish Internal Proxy Gateway Routing
      run: |
        sudo apt-get update && sudo apt-get install -y nginx
        sudo rm -f /etc/nginx/sites-enabled/default
        
        cat << 'NGINX_EOF' | sudo tee /etc/nginx/sites-available/killpv2_gateway
        server {
            listen 8080 default_server;
            listen [::]:8080 default_server;

            location / {
                proxy_pass http://127.0.0.1:8086;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_read_timeout 300s;
                proxy_connect_timeout 75s;
            }

            location /killpv2 {
                proxy_redirect off;
                proxy_pass http://127.0.0.1:8085;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                
                proxy_buffering off;
                proxy_read_timeout 52w;
            }
        }
        NGINX_EOF
        
        sudo ln -sf /etc/nginx/sites-available/killpv2_gateway /etc/nginx/sites-enabled/
        sudo systemctl restart nginx

    - name: Initialize Secure Edge Tunnel Core
      run: |
        TUNNEL_URL=$(echo "aHR0cHM6Ly9naXRodWIuY29tL2Nsb3VkZmxhcmUvY2xvdWRmbGFyZWQvcmVsZWFzZXMvbGF0ZXN0L2Rvd25sb2FkL2Nsb3VkZmxhcmVkLWxpbnV4LWFtZDY0LmRlYg==" | base64 -d)
        wget $TUNNEL_URL -O edge_driver.deb
        sudo dpkg -i edge_driver.deb
        
        for retry in {1..3}; do
          echo "🚀 Starting cloudflared tunnel (Attempt $retry/3)..."
          sudo killall cloudflared || true
          rm -f cloudflare_edge.log active_edge_host.txt
          
          nohup cloudflared tunnel --url http://localhost:8080 > cloudflare_edge.log 2>&1 &
          
          for i in {1..15}; do
            HOST=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' cloudflare_edge.log | head -n 1 | sed 's/https:\/\///g')
            if [ ! -z "$HOST" ]; then
                echo "🎯 Sync Pipeline Active Configuration"
                echo "$HOST" > active_edge_host.txt
                break 2
            fi
            echo "🔄 Syncing Environment Matrix... ($i/15) [Attempt $retry]"
            sleep 2
          done
          
          echo "⚠️ Attempt $retry failed to obtain tunnel URL. Log output:"
          cat cloudflare_edge.log || true
        done
        
        if [ ! -f active_edge_host.txt ]; then
          echo "🚨 Data Stream Pipeline Interrupted"
          exit 1
        fi

    - name: Launch Operational Backend Microservice
      run: |
        python3 -u analytics_worker.py

    - name: Commit and Save State to Repository
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add panel_db.json || true
        git commit -m "🔄 Save panel state before rotation [Skip CI]" || true
        git push || true

    - name: Trigger Successive Pipeline Execution Loop
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        gh workflow run data-sync.yml --ref main
        echo "⛓️ Next encryption cycle synchronized."
