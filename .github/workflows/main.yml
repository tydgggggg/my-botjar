        import net.minecraft.client.gui.widget.ButtonWidget;
        import net.minecraft.client.gui.widget.TextFieldWidget;
        import net.minecraft.text.Text;
        import net.minecraft.client.MinecraftClient;
        import java.io.File;
        import java.io.FileWriter;
        import java.util.Scanner;
        import java.net.ProxySelector;
        import java.net.Socket;
        import java.net.InetSocketAddress;

        public class V2RayScreen extends Screen {
            private final Screen parent;
            private TextFieldWidget ipInput;
            private TextFieldWidget portInput;
            public static String savedIp = "";
            public static String savedPort = "";
            
            private static String connectionStatus = "§eCHECKING...";
            private static boolean threadRunning = false;

            public V2RayScreen(Screen parent) {
                super(Text.literal("V2Ray SOCKS5 Proxy Configuration"));
                this.parent = parent;
                startConnectionWorker();
            }

            private void startConnectionWorker() {
                if (threadRunning) return;
                threadRunning = true;
                new Thread(() -> {
                    while (threadRunning) {
                        String currentIp = savedIp.isEmpty() ? "127.0.0.1" : savedIp;
                        String currentPort = savedPort.isEmpty() ? "10808" : savedPort;
                        try {
                            long startTime = System.currentTimeMillis();
                            Socket socket = new Socket();
                            socket.connect(new InetSocketAddress(currentIp, Integer.parseInt(currentPort)), 1500);
                            socket.close();
                            long delay = System.currentTimeMillis() - startTime;
                            connectionStatus = "§aCONNECTED §7(" + delay + " ms)";
                        } catch (Exception e) {
                            connectionStatus = "§cDISCONNECTED";
                        }
                        try { Thread.sleep(3000); } catch (Exception ex) {}
                    }
                }).start();
            }

            @Override
            protected void init() {
                if (savedIp.isEmpty() && savedPort.isEmpty()) {
                    try {
                        File file = new File(MinecraftClient.getInstance().runDirectory, "v2ray_config.txt");
                        if (file.exists()) {
                            Scanner scanner = new Scanner(file);
                            if (scanner.hasNextLine()) {
                                String[] parts = scanner.nextLine().split(":");
                                if (parts.length >= 2) {
                                    savedIp = parts[0].trim();
                                    savedPort = parts[1].trim();
                                }
                            }
                            scanner.close();
                        }
                    } catch(Exception e){}
                }

                this.ipInput = new TextFieldWidget(this.textRenderer, this.width / 2 - 100, this.height / 2 - 40, 200, 20, Text.literal("Proxy IP"));
                this.ipInput.setMaxLength(128);
                this.ipInput.setText(savedIp.isEmpty() ? "127.0.0.1" : savedIp);
                this.addDrawableChild(this.ipInput);

                this.portInput = new TextFieldWidget(this.textRenderer, this.width / 2 - 100, this.height / 2, 200, 20, Text.literal("Proxy Port"));
                this.portInput.setMaxLength(10);
                this.portInput.setText(savedPort.isEmpty() ? "10808" : savedPort);
                this.addDrawableChild(this.portInput);

                this.addDrawableChild(ButtonWidget.builder(Text.literal("§aApply & Save"), button -> {
                    savedIp = this.ipInput.getText().trim();
                    savedPort = this.portInput.getText().trim();
                    try {
                        File file = new File(MinecraftClient.getInstance().runDirectory, "v2ray_config.txt");
                        FileWriter writer = new FileWriter(file);
                        writer.write(savedIp + ":" + savedPort);
                        writer.close();

                        if (!savedIp.isEmpty() && !savedPort.isEmpty()) {
                            System.setProperty("socksProxyHost", savedIp);
                            System.setProperty("socksProxyPort", savedPort);
                            ProxySelector.setDefault(null);
                        } else {
                            System.clearProperty("socksProxyHost");
                            System.clearProperty("socksProxyPort");
                            ProxySelector.setDefault(null);
                        }
                    } catch(Exception e){}
                    this.client.setScreen(this.parent);
                }).dimensions(this.width / 2 - 105, this.height / 2 + 35, 100, 20).build());

                this.addDrawableChild(ButtonWidget.builder(Text.literal("Cancel"), button -> {
                    this.client.setScreen(this.parent);
                }).dimensions(this.width / 2 + 5, this.height / 2 + 35, 100, 20).build());
            }

            @Override
            public void render(net.minecraft.client.gui.DrawContext context, int mouseX, int mouseY, float delta) {
                this.renderBackground(context, mouseX, mouseY, delta);
                context.drawCenteredTextWithShadow(this.textRenderer, this.title, this.width / 2, 15, 0xFFFFFF);
                context.drawText(this.textRenderer, "SOCKS IP:", this.width / 2 - 155, this.height / 2 - 35, 0xAAAAAA, false);
                context.drawText(this.textRenderer, "PORT:", this.width / 2 - 140, this.height / 2 + 5, 0xAAAAAA, false);
                
                context.drawCenteredTextWithShadow(this.textRenderer, "Status: " + connectionStatus, this.width / 2, this.height / 2 + 70, 0xFFFFFF);
                super.render(context, mouseX, mouseY, delta);
            }

            @Override
            public void close() {
                threadRunning = false;
                super.close();
            }
        }
