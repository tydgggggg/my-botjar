        cat << 'EOF' > src/main/java/com/fpsboost/ui/BenchmarkEngine.java
        package com.fpsboost.ui;

        import net.minecraft.client.MinecraftClient;
        import java.util.ArrayList;
        import java.util.List;

        public class BenchmarkEngine {
            private static boolean active = false;
            private static long stageStartTime = 0;
            private static int currentStage = -1;
            private static int totalFrames = 0;
            private static long totalFpsSum = 0;
            private static final List<String> liveLogs = new ArrayList<>();

            public static class Profile {
                public String name;
                public int renderDistance;
                public int simulationDistance;
                public boolean ao;
                public double avgFps = 0;

                public Profile(String name, int rd, int sd, boolean ao) {
                    this.name = name; this.renderDistance = rd; this.simulationDistance = sd; this.ao = ao;
                }
            }

            private static final List<Profile> profiles = new ArrayList<>();

            public static void start() {
                profiles.clear();
                liveLogs.clear();
                addLog("Starting AI Hardware Analyzer...");
                
                profiles.add(new Profile("KILL_PV2 Aggressive Max-FPS", 2, 2, false));
                profiles.add(new Profile("Potato Android Core (Ultra)", 2, 4, false));
                profiles.add(new Profile("Low End Mobile GPU Balance", 3, 4, false));
                profiles.add(new Profile("Snapdragon Midrange Optimization", 4, 4, false));
                profiles.add(new Profile("Standard Balanced Execution", 4, 5, false));
                profiles.add(new Profile("Smooth Advanced Shadow Mapping", 3, 4, true));
                profiles.add(new Profile("Mali Dynamic Chunk Multithread", 4, 6, true));

                active = true;
                currentStage = 0;
                stageStartTime = System.currentTimeMillis();
                totalFrames = 0;
                totalFpsSum = 0;
                applyProfile(profiles.get(0));
            }

            public static boolean isActive() { return active; }
            public static List<String> getLiveLogs() { return liveLogs; }

            public static String getStatusText() {
                if (!active || currentStage >= profiles.size()) return "";
                long elapsed = System.currentTimeMillis() - stageStartTime;
                long remaining = Math.max(0, (15000 - elapsed) / 1000);
                return "§e[AI Auto Testing] Profile: " + (currentStage + 1) + "/" + profiles.size() + " (" + profiles.get(currentStage).name + ") | " + remaining + "s";
            }

            public static void tick(MinecraftClient client) {
                if (!active) return;

                totalFrames++;
                totalFpsSum += client.getCurrentFps();

                if (totalFrames % 60 == 0) {
                    addLog("Sampling profile " + (currentStage + 1) + " Current FPS: " + client.getCurrentFps());
                }

                long elapsed = System.currentTimeMillis() - stageStartTime;
                if (elapsed >= 15000) {
                    Profile current = profiles.get(currentStage);
                    current.avgFps = totalFrames > 0 ? (double) totalFpsSum / totalFrames : 0;
                    addLog("Profile " + (currentStage + 1) + " finished. Avg: " + String.format("%.1f", current.avgFps));

                    currentStage++;
                    if (currentStage >= profiles.size()) {
                        active = false;
                        Profile best = profiles.get(0);
                        for (Profile p : profiles) {
                            if (p.avgFps > best.avgFps) { best = p; }
                        }
                        addLog("=== Optimization Finished ===");
                        addLog("AI Picked: " + best.name + " (" + String.format("%.1f", best.avgFps) + " FPS)");
                        applyProfile(best);
                        try { client.options.write(); } catch(Exception e){}
                    } else {
                        stageStartTime = System.currentTimeMillis();
                        totalFrames = 0;
                        totalFpsSum = 0;
                        applyProfile(profiles.get(currentStage));
                    }
                }
            }

            private static void addLog(String message) {
                liveLogs.add(message);
                if (liveLogs.size() > 5) { liveLogs.remove(0); }
            }

            private static void applyProfile(Profile p) {
                MinecraftClient client = MinecraftClient.getInstance();
                if (client == null || client.options == null) return;
                try { client.options.getViewDistance().setValue(p.renderDistance); } catch(Exception e){}
                try { client.options.getSimulationDistance().setValue(p.simulationDistance); } catch(Exception e){}

                try {
                    Object aoOpt = client.options.getAo();
                    Object[] constants = aoOpt.getClass().getMethod("getValue").invoke(aoOpt).getClass().getEnumConstants();
                    Object target = constants[0];
                    for (Object c : constants) {
                        if (p.ao && (c.toString().equalsIgnoreCase("MAX") || c.toString().equalsIgnoreCase("TRUE"))) {
                            target = c; break;
                        } else if (!p.ao && (c.toString().equalsIgnoreCase("OFF") || c.toString().equalsIgnoreCase("FALSE"))) {
                            target = c; break;
                        }
                    }
                    for (java.lang.reflect.Method m : aoOpt.getClass().getMethods()) {
                        if (m.getName().equals("setValue") && m.getParameterCount() == 1) {
                            m.setAccessible(true); m.invoke(aoOpt, target); break;
                        }
                    }
                } catch (Exception e) {}

                if (client.worldRenderer != null) { client.worldRenderer.reload(); }
            }
        }
        EOF

