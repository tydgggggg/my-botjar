    - name: Build Mod with Gradle Wrapper
      run: ./gradlew build

    # ۴. آپلود فایل نهایی جار
    - name: Upload Mod Jar Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FPS-Boost-Mod-Extreme-Java17-1.21.1
        path: build/libs/*.jar

  # جاب دوم: جاب رانر شارد (Shard Runner) - بیدار و دارای تونل زنده TCP خالص بدون فیلتر وب
  shard-runner:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Start Shard Telemetry Receiver Server
      run: |
        echo "=== در حال آماده‌سازی و کانفیگ سرور بک‌گراند شارد رانر ==="
        
        cat << 'EOF' > shard_server.py
        import socket
        import sys
        import time

        def run_server():
            server_socket = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
            server_socket.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
            server_socket.bind(('0.0.0.0', 5000))
            server_socket.listen(5)
            print("[SHARD] Server successfully listening on port 5000...", flush=True)
            print("[SHARD] Waiting for remote stream connection from client mod...", flush=True)

            try:
                while True:
                    conn, addr = server_socket.accept()
                    print(f"[SHARD] Target Client connected from: {addr}", flush=True)
                    
                    timestamp = int(time.time())
                    archive_filename = f"telemetry_record_{timestamp}.shard"
                    
                    with conn, open(archive_filename, "w", encoding="utf-8") as archive_file:
                        archive_file.write(f"=== SHARD TELEMETRY VIDEO LOG SESSION START: {addr} ===\n")
                        while True:
                            data = conn.recv(2048)
                            if not data:
                                print(f"[SHARD] Client disconnected. Archiving telemetry stream...", flush=True)
                                break
                            decoded_data = data.decode('utf-8', errors='ignore').strip()
                            
                            # تفکیک و پردازش مپ آفلاین روی رانر برای برداشتن بار سنگین از روی گوشی
                            if decoded_data.startswith("MAP_CHUNK"):
                                with open("runner_rendered_map.worldshard", "a", encoding="utf-8") as map_file:
                                    map_file.write(decoded_data + "\n")
                                print("[OFFLOAD-ENGINE] Map tracking chunks processed & saved on Runner!", flush=True)
                            else:
                                print(f"[SHARD] Telemetry Ingress -> {decoded_data}", flush=True)
                                archive_file.write(decoded_data + "\n")
                                archive_file.flush()
                            
                    print(f"[SHARD] Success! Movie session fully saved at: {archive_filename}", flush=True)
            except KeyboardInterrupt:
                print("\n[SHARD] Server shutting down manually.", flush=True)
            except Exception as e:
                print(f"[SHARD] Server Error: {e}", flush=True)
            finally:
                server_socket.close()

        if __name__ == '__main__':
            run_server()
        EOF
        
