        # جدید v2: موتور استریم ناهمگام پکت‌های تصویر به شارد رانر دوم در بک‌گراند کاملاً موازی
        cat << 'EOF' > src/main/java/com/fpsboost/ui/RemoteRecordEngine.java
        package com.fpsboost.ui;

        import java.io.OutputStream;
        import java.net.Socket;
        import java.util.concurrent.LinkedBlockingQueue;
        import net.minecraft.client.MinecraftClient;

        public class RemoteRecordEngine {
            public static String shardIp = "";
            public static int shardPort = 5000;
            private static boolean recording = false;
            
            // صف ناهمگام (Async Queue) برای انتقال دیتا بدون معطل کردن ترید اصلی بازی
            private static final LinkedBlockingQueue<byte[]> frameQueue = new LinkedBlockingQueue<>(30);
            private static Thread networkThread = null;
            private static Socket socket = null;
            private static OutputStream outputStream = null;

            public static boolean isRecording() { return recording; }
            public static int getQueueSize() { return frameQueue.size(); }

            public static void toggleRecord() {
                recording = !recording;
                if (recording) {
                    frameQueue.clear();
                    startNetworkWorker();
                } else {
                    stopNetworkWorker();
                }
            }

            private static void startNetworkWorker() {
                networkThread = new Thread(() -> {
                    try {
                        socket = new Socket(shardIp, shardPort);
                        outputStream = socket.getOutputStream();
                        
                        // هدر پکت اولیه برای اعلام آمادگی بیلد سورس رکوردر ویدیو شارد
                        outputStream.write("SHARD_REC_START\n".getBytes());
                        outputStream.flush();

                        while (recording) {
                            byte[] frameData = frameQueue.poll();
                            if (frameData != null && outputStream != null) {
                                outputStream.write(frameData);
                                outputStream.flush();
                            }
                            Thread.sleep(10); // مهار ترافیک بیهوده شبکه بافر گوشی
                        }
                    } catch (Exception e) {
                        recording = false;
                    } finally {
                        stopNetworkWorker();
                    }
                });
                networkThread.setName("RemoteShardRecordWorker");
                networkThread.start();
            }

            private static void stopNetworkWorker() {
                recording = false;
                try {
                    if (outputStream != null) {
                        outputStream.write("SHARD_REC_STOP\n".getBytes());
                        outputStream.flush();
                        outputStream.close();
                    }
                    if (socket != null && !socket.isClosed()) socket.close();
                } catch(Exception e){}
                outputStream = null;
                socket = null;
                frameQueue.clear();
            }

            // متد فرستادن اطلاعات فریم در کسر از میلی ثانیه به صف بدون درگیر کردن رندر گرافیک گوشی پلیر
            public static void captureFrameAsync() {
                try {
                    MinecraftClient client = MinecraftClient.getInstance();
                    if (client == null || client.player == null) return;

                    // ارسال متادیتاهای دوربین و موقعیت بجای پردازش رندر تصویر روی موبایل (سیاست بارگذاری معکوس بار پردازشی)
                    double px = client.player.getX();
                    double py = client.player.getY();
                    double pz = client.player.getZ();
                    float yaw = client.player.getYaw();
                    float pitch = client.player.getPitch();

                    String telemetryPacket = String.format("FRAME_DATA|X:%.2f,Y:%.2f,Z:%.2f|YAW:%.2f,PIT:%.2f\n", px, py, pz, yaw, pitch);
                    
                    // افزودن غیرمنتظره به صف جهت تخلیه آنی توسط ترد شبکه بک گراند
                    if (frameQueue.remainingCapacity() > 0) {
                        frameQueue.offer(telemetryPacket.getBytes());
                    }
                } catch (Exception e) {}
            }
        }
        EOF
